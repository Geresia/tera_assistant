<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: sans-serif;
      font-size: 14px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    h3 { margin: 0; font-size: 15px; }
    .lang-toggle {
      display: flex;
      gap: 4px;
    }
    .lang-btn {
      width: auto;
      padding: 2px 8px;
      font-size: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      background: #f5f5f5;
      color: #333;
      margin: 0;
    }
    .lang-btn.active {
      background: #1a73e8;
      color: white;
      border-color: #1a73e8;
    }
    input {
      width: 100%;
      padding: 6px 8px;
      box-sizing: border-box;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 6px;
    }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #555;
      min-height: 20px;
    }
    .success { color: #1a7a1a; font-weight: bold; }
    .error { color: #c00; }
    hr { border: none; border-top: 1px solid #eee; margin: 10px 0; }
    #updateBanner {
      display: none;
      background: #e8a000;
      color: white;
      padding: 6px 8px;
      border-radius: 4px;
      margin-bottom: 10px;
      cursor: pointer;
      font-size: 12px;
    }
    #teraBtn {
      background: #0a7c47;
    }
    #teraBtn:disabled { background: #aaa; }
    #teraStatus {
      font-size: 12px;
      color: #555;
      min-height: 16px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="updateBanner"></div>
  <div class="header">
    <h3>Trip.com Room Scraper</h3>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnKR">KR</button>
      <button class="lang-btn" id="btnEN">EN</button>
    </div>
  </div>
  <input type="text" id="hotelId" placeholder="Hotel ID" />
  <button id="startBtn"></button>
  <hr>
  <input type="text" id="hotelName" placeholder="" />
  <div id="status"></div>
  <hr>
  <button id="teraBtn">Tera Autofill</button>
  <div id="teraStatus"></div>

  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
