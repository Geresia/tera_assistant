<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: sans-serif;
      font-size: 14px;
    }
    h3 { margin: 0 0 12px; font-size: 15px; }
    input {
      width: 100%;
      padding: 6px 8px;
      box-sizing: border-box;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 6px;
    }
    button.green { background: #1a7a1a; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #555;
      min-height: 20px;
    }
    .success { color: #1a7a1a; font-weight: bold; }
    .error { color: #c00; }
    hr { border: none; border-top: 1px solid #eee; margin: 10px 0; }
  </style>
</head>
<body>
  <div id="updateBanner" style="display:none; background:#e8a000; color:white; padding:6px 8px; border-radius:4px; margin-bottom:10px; cursor:pointer; font-size:12px;"></div>
  <h3>🏨 Trip.com Room Scraper</h3>
  <input type="text" id="hotelId" placeholder="Hotel ID 입력" />
  <button id="startBtn">스캔 시작 (1차 + +3일 + +7일)</button>
  <hr>
  <input type="text" id="hotelName" placeholder="호텔 이름 입력 (사진용)" />
  <div id="status">Trip.com 호텔 페이지에서 실행하세요.</div>

  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
